<!DOCTYPE html>
<html>
<head>
  <title>Upload Receipt</title>
</head>
<body>
  <h2>Upload JPG / PDF</h2>
  <form action="/upload" method="post" enctype="multipart/form-data">
    <input type="file" name="receipt" accept="application/pdf,image/jpeg,image/jpg" required>
    <button type="submit">Upload</button>
  </form>
</body>
</html>
